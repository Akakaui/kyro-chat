version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - E2B_API_KEY=${E2B_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_PORT=${IMAP_PORT}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASS=${IMAP_PASS}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Browser service (noVNC) - KasmWeb Chrome
  browser:
    image: kasmweb/chrome:1.15.0
    ports:
      - "6901:6901"
    environment:
      - VNC_PASSWORD=${VNC_PASSWORD:-changeme}
      - KASM_DISABLE_AUTH=${KASM_DISABLE_AUTH:-1}
    restart: unless-stopped
