# =============================================================================
# Kyro Chat — Nginx Reverse Proxy
# For use behind Coolify/Caddy or standalone deployment
# Place in /etc/nginx/sites-available/kyro-chat
# =============================================================================

upstream api {
    server api:3001;
}

upstream web {
    server web:3000;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$server_name$request_uri;
}

# ── HTTPS server ───────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL is managed by Coolify/Caddy automatically.
    # When using standalone: provide ssl_certificate + ssl_certificate_key.

    # ── Logs ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/kyro-chat-access.log;
    error_log  /var/log/nginx/kyro-chat-error.log;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API Proxy ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── WebSocket for chat/streaming ──────────────────────────────────────
    location /ws {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ── SSE / Chat streaming (no buffering) ───────────────────────────────
    location /api/chat {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    # ── Health check ──────────────────────────────────────────────────────
    location /health {
        proxy_pass http://api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Frontend (Next.js) ────────────────────────────────────────────────
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Next.js static assets (long cache) ────────────────────────────────
    location /_next/static {
        proxy_pass http://web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
